name: Deploy to soulpeek.app

# Push to main → rsync the static files to /opt/soulpeek-website/ on the
# Hetzner host, where an nginx:alpine container (started outside Coolify's
# managed lifecycle) serves them directly. nginx reads files on every
# request, so no container restart is needed.
#
# Required GitHub repo secrets:
#   DEPLOY_HOST  — the server hostname / IP (e.g. 178.104.150.49)
#   DEPLOY_USER  — SSH user (root)
#   DEPLOY_KEY   — the ED25519 private key authorised for that user

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual runs from the Actions tab

concurrency:
  group: deploy-soulpeek-app
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to server
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='nginx.conf' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            ./ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/soulpeek-website/"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
